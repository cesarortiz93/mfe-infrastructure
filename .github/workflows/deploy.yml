# .github/workflows/deploy.yml
name: Deploy MFEs

on:
  repository_dispatch:
    types:
      - mfe-shell-updated
      - mfe-inicio-updated
      - mfe-portafolio-updated
      - mfe-siniestros-updated

  workflow_dispatch:
    inputs:
      mfe:
        description: "Nombre del MFE a actualizar"
        required: true
      version:
        description: "Versión o commit"
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure git remote with PAT
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Resolve variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MFE="${{ github.event.client_payload.mfe }}"
            VERSION="${{ github.event.client_payload.version }}"
          else
            MFE="${{ inputs.mfe }}"
            VERSION="${{ inputs.version }}"
          fi

          echo "MFE=$MFE" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update .env
        run: |
          MFE="${{ steps.vars.outputs.MFE }}"
          VERSION="${{ steps.vars.outputs.VERSION }}"
          KEY="${MFE^^}_VERSION"

          if grep -q "^${KEY}=" .env; then
            sed -i "s/^${KEY}=.*/${KEY}=${VERSION}/" .env
          else
            echo "${KEY}=${VERSION}" >> .env
          fi

      - name: Commit changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git add .env

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ${{ steps.vars.outputs.MFE }} to ${{ steps.vars.outputs.VERSION }}"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          fi

      - name: Deploy via SSH
        run: echo "Deploy configurado en Sección 5"
