name: Deploy MFEs

on:
  repository_dispatch:
    types:
      - mfe-shell-updated
      - mfe-inicio-updated
      - mfe-portafolio-updated
      - mfe-siniestros-updated

  workflow_dispatch:
    inputs:
      mfe:
        description: "Nombre del MFE a actualizar"
        required: true
      version:
        description: "Versión o commit"
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: Resolve variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MFE="${{ github.event.client_payload.mfe }}"
            VERSION="${{ github.event.client_payload.version }}"
          else
            MFE="${{ inputs.mfe }}"
            VERSION="${{ inputs.version }}"
          fi
          echo "MFE=$MFE" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update .env
        run: |
          MFE="${{ steps.vars.outputs.MFE }}"
          VERSION="${{ steps.vars.outputs.VERSION }}"
          KEY="${MFE^^}_VERSION"

          if grep -q "^${KEY}=" .env; then
            sed -i "s/^${KEY}=.*/${KEY}=${VERSION}/" .env
          else
            echo "${KEY}=${VERSION}" >> .env
          fi
      
      - name: Debug remote URL
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          echo "Remote actual:"
          git remote -v
          
          echo "Token vacío o no?"
          if [ -z "${INFRA_DISPATCH_TOKEN}" ]; then
            echo "ERROR: INFRA_DISPATCH_TOKEN está VACÍO"
          else
            echo "OK: Token tiene ${#INFRA_DISPATCH_TOKEN} caracteres"
          fi

          echo "Repository owner: ${{ github.repository_owner }}"
          echo "Repository: ${{ github.repository }}"

      - name: Commit and push
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.repository }}
          MFE: ${{ steps.vars.outputs.MFE }}
          VERSION: ${{ steps.vars.outputs.VERSION }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .env

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ${MFE} to ${VERSION}"
            git remote set-url origin https://${REPO_OWNER}:${INFRA_DISPATCH_TOKEN}@github.com/${REPO_NAME}.git
            git push origin HEAD
          fi

      - name: Deploy via SSH
        run: echo "Deploy configurado"